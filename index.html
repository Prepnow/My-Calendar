<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scheduly</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#1e2028;color:#eae8f0;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:inherit;font-size:inherit}
textarea{resize:vertical}

.hdr{background:linear-gradient(to right,#1a1d26,#22263a);border-bottom:1px solid #363a4a;padding:15px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-left{display:flex;align-items:center;gap:11px;min-width:0}
.hdr-icon{width:31px;height:31px;border-radius:8px;background:linear-gradient(135deg,#e8a87c,#d4845a);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr-title{font-size:18px;font-style:italic;letter-spacing:.06em;white-space:nowrap}
.badge{font-size:9px;font-weight:700;letter-spacing:.12em;padding:2px 8px;border-radius:20px;background:rgba(232,168,124,.12);border:1px solid rgba(232,168,124,.35);color:#e8a87c;flex-shrink:0}

.btn-ghost{background:transparent;border:1px solid #363a4a;color:#9b98ac;padding:6px 13px;font-size:11px;letter-spacing:.07em;border-radius:7px;cursor:pointer;transition:border-color .15s,color .15s;white-space:nowrap;flex-shrink:0}
.btn-ghost:hover{border-color:rgba(232,168,124,.4);color:#e8a87c}
.btn-primary{display:block;width:100%;padding:13px;font-size:14px;font-weight:700;letter-spacing:.05em;border:none;border-radius:9px;cursor:pointer;background:linear-gradient(135deg,#e8a87c,#d4845a);color:#1e1a14;box-shadow:0 4px 14px rgba(232,168,124,.35);transition:transform .15s,box-shadow .15s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,168,124,.45)}
.btn-primary:disabled{background:#2e3140;color:#636078;box-shadow:none;cursor:not-allowed;transform:none}
.btn-back{background:none;border:none;color:#9b98ac;cursor:pointer;font-size:13px;padding:0;margin-bottom:18px;display:block}
.btn-back:hover{color:#eae8f0}

.hero{background:linear-gradient(to right,#1a1d26,#22253a);border-bottom:1px solid #363a4a;padding:22px 26px}
.hero h1{font-size:23px;font-weight:normal;margin-bottom:5px}
.hero p{color:#9b98ac;font-size:14px;line-height:1.6}
.main{max-width:900px;margin:0 auto;padding:26px 20px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.adm-col{display:grid;grid-template-columns:275px 1fr;gap:26px;align-items:start}

.card{background:#272a35;border:1px solid #363a4a;border-radius:13px;padding:20px;margin-bottom:12px;box-shadow:0 4px 18px rgba(0,0,0,.25)}
.card-hl{background:rgba(232,168,124,.09);border-color:rgba(232,168,124,.3)}
.card-warn{background:rgba(240,120,80,.07);border:1px solid rgba(240,120,80,.28);border-radius:12px;padding:16px 18px;margin-bottom:16px;font-size:13px;line-height:1.75;color:#ddb0a8}
.card-warn strong{color:#e8a87c}
.card-warn code{background:rgba(0,0,0,.3);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:12px;color:#eae8f0}

.inp{display:block;width:100%;background:#1e2028;border:1.5px solid #363a4a;border-radius:8px;color:#eae8f0;padding:11px 13px;font-size:15px;outline:none;margin-bottom:13px;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:rgba(232,168,124,.6);box-shadow:0 0 0 3px rgba(232,168,124,.1)}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#636078;margin-bottom:8px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.cal-btn{background:#2e3140;border:1px solid #363a4a;color:#9b98ac;width:33px;height:33px;border-radius:50%;cursor:pointer;font-size:17px;line-height:1;transition:background .15s}
.cal-btn:hover{background:#363a4a}
.cal-month{font-size:15px;letter-spacing:.03em}
.cal-tbl{width:100%;border-collapse:separate;border-spacing:3px}
.cal-tbl th{text-align:center;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#636078;padding:3px 0 6px}
.cal-tbl td{padding:0}
.day{width:100%;aspect-ratio:1;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;font-size:13px;border:1px solid transparent;cursor:default;user-select:none;transition:background .12s,transform .1s;line-height:1.2}
.day.click{cursor:pointer}
.day.click:active{transform:scale(.92)}
.d-open{background:rgba(126,200,164,.13);border-color:rgba(126,200,164,.38);color:#7ec8a4}
.d-open.click:hover{background:rgba(126,200,164,.22)}
.d-sel{background:linear-gradient(135deg,#e8a87c,#d4845a);color:#1e1a14;font-weight:700;box-shadow:0 4px 13px rgba(232,168,124,.4)}
.d-full{background:rgba(99,96,120,.15);border-color:rgba(99,96,120,.25);color:#636078}
.d-past{color:#2c2f3a}
.d-aon{background:rgba(232,168,124,.13);border-color:rgba(232,168,124,.38);color:#e8a87c}
.d-aon.click:hover{background:rgba(232,168,124,.22)}
.d-aoff{color:#4a4860}
.d-aoff.click:hover{background:#2a2d3a}
.dot{width:5px;height:5px;border-radius:50%;background:#7ec8a4;margin-top:2px}
.dtag{font-size:8px;font-weight:700;margin-top:1px;letter-spacing:.04em;opacity:.85}

.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:7px;margin-bottom:14px}
.tchip{padding:9px 5px;border-radius:8px;font-size:12px;text-align:center;user-select:none;cursor:pointer;border:1px solid transparent;line-height:1.3;transition:background .12s,transform .1s}
.tchip:active{transform:scale(.93)}
.t-av{background:rgba(126,200,164,.12);border-color:rgba(126,200,164,.35);color:#7ec8a4}
.t-av:hover{background:rgba(126,200,164,.22)}
.t-sl{background:rgba(232,168,124,.18);border-color:#e8a87c;color:#e8a87c}
.t-bk{background:rgba(99,96,120,.2);border-color:rgba(99,96,120,.28);color:#636078;cursor:default}
.tsub{font-size:9px;font-weight:700;margin-top:2px;letter-spacing:.05em}

.pill{display:inline-block;padding:5px 9px;border-radius:6px;font-size:12px;cursor:pointer;user-select:none;border:1px solid #363a4a;color:#636078;margin:0 3px 4px 0;transition:background .12s}
.pill:hover{background:#2a2d3a}
.p-on{background:rgba(232,168,124,.12);border-color:rgba(232,168,124,.38);color:#e8a87c;font-weight:600}
.p-lk{background:rgba(99,96,120,.18);border-color:rgba(99,96,120,.28);color:#636078;cursor:default}

.tabs{display:flex;border-bottom:1px solid #363a4a;margin-bottom:22px}
.tab{background:none;border:none;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;cursor:pointer;color:#636078;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab.active{color:#e8a87c;border-bottom-color:#e8a87c}

.notice{padding:11px 15px;border-radius:9px;margin-bottom:18px;background:rgba(232,168,124,.08);border:1px solid rgba(232,168,124,.28);font-size:13px;color:#9b98ac;line-height:1.6}
.err{color:#e07878;font-size:13px;margin-bottom:11px}
.legend{display:flex;gap:14px;margin-top:11px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px}
.leg-sw{width:10px;height:10px;border-radius:3px}
.bk-card{border-left:3px solid #e8a87c;padding:15px 17px;margin-bottom:11px}

.sync-bar{font-size:12px;margin-left:8px;font-style:italic}
.sync-ok{color:#7ec8a4}.sync-spin{color:#e8a87c}.sync-err{color:#e07878}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #363a4a;border-top-color:#e8a87c;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .two-col,.adm-col{grid-template-columns:1fr}
  .main{padding:16px 13px}
  .hero{padding:16px 14px}
  .hdr{padding:13px 14px}
  .tgrid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════════
//  CONFIG — fill these in (see README for instructions)
// ══════════════════════════════════════════════════════════════════
const CFG = {
  pass  : "admin123",         // your admin password
  title : "Scheduly",         // your name / brand

  // Firebase
  firebaseUrl: "https://calendar-ff8ea-default-rtdb.firebaseio.com",

  // ── Admin notification (formspree.io — free) ─────────────────────
  // formspree.io → New Form → paste the ID (e.g. "xpwzgkrb")
  formspreeId : "mykdnygr",   // ← your Formspree form ID

  // ── Auto-reply to booker (emailjs.com — free) ─────────────────────
  // See README for setup. Fill in all 3 to send bookers a confirmation.
  ejPublicKey  : "-c5dUKFufcB5mrRUw",  // EmailJS → Account → Public Key
  ejServiceId  : "service_lc7jo4n",  // EmailJS → Email Services → Service ID
  ejTemplateId : "template_ctf27my",  // EmailJS → Email Templates → Template ID
};

const EMAIL_READY  = !!CFG.formspreeId;
const REPLY_READY  = !!(CFG.ejPublicKey && CFG.ejServiceId && CFG.ejTemplateId);
// ══════════════════════════════════════════════════════════════════

const FIREBASE_READY = CFG.firebaseUrl !== "YOUR_FIREBASE_URL";
const DB = CFG.firebaseUrl.replace(/\/+$/, "") + "/scheduly.json";

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];
const TIMES=["8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM"];

// ── State ─────────────────────────────────────────────────────────
const S={
  view:"pub", step:"pick",
  avail:{}, books:[],
  py:0,pm:0, ay:0,am:0, atab:"cal",
  sd:null, st:null,
  name:"",email:"",note:"",
  berr:"",busy:false,
  pw:"",pwerr:false,
  syncing:false, syncErr:false, loaded:false,
  testStatus:'',  // email test result message
};
(()=>{const n=new Date();S.py=S.ay=n.getFullYear();S.pm=S.am=n.getMonth();})();

// ── Helpers ───────────────────────────────────────────────────────
const daysIn =(y,m)=>new Date(y,m+1,0).getDate();
const firstWD=(y,m)=>new Date(y,m,1).getDay();
const toKey  =(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const fmtDate= k=>{const[y,m,d]=k.split('-');return`${MONTHS[+m-1]} ${+d}, ${y}`;};
const isPast = k=>{const t=new Date();t.setHours(0,0,0,0);const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d)<t;};
const isBook =(dt,tm)=>S.books.some(b=>b.date===dt&&b.time===tm);
const openOf = dt=>(S.avail[dt]||[]).filter(t=>!isBook(dt,t));
const anyOpen=()=>Object.values(S.avail).some(a=>a.length>0);
const esc    = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Firebase REST ─────────────────────────────────────────────────
async function dbRead(){
  const r=await fetch(DB);
  if(!r.ok) throw new Error("read "+r.status);
  const d=await r.json();
  return d||{avail:{},books:[]};
}
async function dbWrite(data){
  const r=await fetch(DB,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data),
  });
  if(!r.ok) throw new Error("write "+r.status);
}

// ── Load & Save ───────────────────────────────────────────────────
function localLoad(){
  try{const v=localStorage.getItem("sched_v4");if(v){const d=JSON.parse(v);S.avail=d.avail||{};S.books=d.books||[];}}catch(e){}
}
function localSave(){
  try{localStorage.setItem("sched_v4",JSON.stringify({avail:S.avail,books:S.books}));}catch(e){}
}

async function load(){
  if(!FIREBASE_READY){localLoad();return;}
  try{
    const d=await dbRead();
    S.avail=d.avail||{};
    S.books=d.books||[];
    localSave();
    S.syncErr=false;
  }catch(e){
    console.warn("Firebase read failed, using local cache:",e);
    localLoad();
    S.syncErr=true;
  }
}

async function save(){
  localSave();
  if(!FIREBASE_READY) return;
  S.syncing=true; render();
  try{
    await dbWrite({avail:S.avail,books:S.books});
    S.syncErr=false;
  }catch(e){
    console.error("Firebase write failed:",e);
    S.syncErr=true;
  }
  S.syncing=false; render();
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  let h="";
  if(!S.loaded)              h=vLoad();
  else if(S.view==="login")  h=vLogin();
  else if(S.view==="admin")  h=vAdmin();
  else if(S.step==="confirm")h=vConfirm();
  else if(S.step==="done")   h=vDone();
  else                        h=vPub();
  document.getElementById("app").innerHTML=h;
}

function vLoad(){
  return`<div class="hdr"><div class="hdr-left"><div class="hdr-icon">&#128197;</div><span class="hdr-title">${CFG.title}</span></div></div>
  <div class="loading"><div class="spinner"></div><p style="color:#9b98ac;font-size:14px">Loading availability…</p></div>`;
}

// ── Calendar ──────────────────────────────────────────────────────
function buildCal(y,m,cellFn,prevFn,nextFn){
  const dim=daysIn(y,m), fd=firstWD(y,m);
  let rows="<tr>";
  for(let i=0;i<fd;i++) rows+=`<td><div class="day"></div></td>`;
  for(let d=1;d<=dim;d++){
    const k=toKey(y,m,d), c=cellFn(k);
    rows+=`<td><div class="day ${c.cls}" ${c.fn?`onclick="${c.fn}('${k}')"`:''}>
      ${d}${c.dot?'<div class="dot"></div>':''}${c.tag?`<div class="dtag">${c.tag}</div>`:''}
    </div></td>`;
    if((fd+d)%7===0&&d<dim)rows+='</tr><tr>';
  }
  rows+='</tr>';
  return`<div class="cal-nav">
    <button class="cal-btn" onclick="${prevFn}()">&#8249;</button>
    <span class="cal-month">${MONTHS[m]} ${y}</span>
    <button class="cal-btn" onclick="${nextFn}()">&#8250;</button>
  </div>
  <table class="cal-tbl">
    <thead><tr>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Views ─────────────────────────────────────────────────────────
function notConfiguredWarning(){
  return`<div class="card-warn">
    &#9888; <strong>Firebase not configured yet.</strong> Public visitors see an empty calendar until you add your <code>firebaseUrl</code> to the config. See the README &#8212; setup takes about 3 minutes.
  </div>`;
}

function vPub(){
  const cal=buildCal(S.py,S.pm,k=>{
    if(isPast(k))return{cls:'d-past'};
    const op=openOf(k).length, tot=(S.avail[k]||[]).length;
    if(k===S.sd)return{cls:'d-sel click',fn:'selDate'};
    if(op>0)    return{cls:'d-open click',fn:'selDate',dot:true};
    if(tot>0)   return{cls:'d-full',tag:'FULL'};
    return{cls:''};
  },'pubPrev','pubNext');

  let times='';
  if(!S.sd){
    times=`<div class="card" style="text-align:center;padding:38px 18px">
      <div style="width:48px;height:48px;border-radius:50%;background:rgba(232,168,124,.1);border:1px solid rgba(232,168,124,.28);display:flex;align-items:center;justify-content:center;font-size:21px;margin:0 auto 13px">&#128070;</div>
      <p style="color:#9b98ac;font-size:14px;line-height:1.7">${anyOpen()?'Pick a green date to see available times.':'No dates available yet.'}</p>
    </div>`;
  }else{
    const slots=S.avail[S.sd]||[], op=openOf(S.sd).length;
    let chips='';
    if(!slots.length){
      chips='<p style="color:#636078;font-size:14px">No slots for this date.</p>';
    }else{
      chips='<div class="tgrid">';
      slots.forEach(t=>{
        const bk=isBook(S.sd,t),sel=S.st===t;
        const cls=bk?'t-bk':sel?'t-sl':'t-av';
        chips+=`<div class="tchip ${cls}" ${bk?'':(`onclick="selTime('${t}')"`)}>
          ${t}${bk?'<div class="tsub">FILLED</div>':''}
        </div>`;
      });
      chips+='</div>';
      if(!op&&slots.length)chips+='<p style="color:#636078;font-size:13px">All slots booked for this date.</p>';
    }
    const btn=(S.st&&!isBook(S.sd,S.st))
      ?`<button class="btn-primary" style="margin-top:10px" onclick="goConfirm()">Book ${S.st} &#8594;</button>`:'';
    times=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:7px">
        <span style="font-size:15px;font-weight:600">${fmtDate(S.sd)}</span>
        <span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(126,200,164,.12);border:1px solid rgba(126,200,164,.33);color:#7ec8a4">${op} open</span>
      </div>
      ${chips}${btn}
    </div>`;
  }

  const syncNote=FIREBASE_READY&&S.syncErr?'<div class="notice">&#9888; Could not reach cloud storage &#8212; showing cached data.</div>':'';

  return`<div class="hdr">
    <div class="hdr-left"><div class="hdr-icon">&#128197;</div><span class="hdr-title">${CFG.title}</span></div>
    <button class="btn-ghost" onclick="goLogin()">Admin</button>
  </div>
  <div class="hero"><h1>Book a time</h1><p>Select a green date, then pick a time slot.</p></div>
  <div class="main">
    ${!FIREBASE_READY?notConfiguredWarning():''}
    ${syncNote}
    <div class="two-col">
      <div>
        <span class="lbl">1 &#8212; Choose a date</span>
        <div class="card">${cal}</div>
        <div class="legend">
          <div class="leg-item"><div class="leg-sw" style="background:rgba(126,200,164,.13);border:1px solid rgba(126,200,164,.38)"></div><span style="color:#7ec8a4">Available</span></div>
          <div class="leg-item"><div class="leg-sw" style="background:rgba(99,96,120,.15);border:1px solid rgba(99,96,120,.25)"></div><span style="color:#636078">Fully booked</span></div>
        </div>
      </div>
      <div><span class="lbl">2 &#8212; Choose a time</span>${times}</div>
    </div>
  </div>`;
}

function vConfirm(){
  return`<div class="hdr">
    <div class="hdr-left"><div class="hdr-icon">&#128197;</div><span class="hdr-title">${CFG.title}</span></div>
    <button class="btn-ghost" onclick="goLogin()">Admin</button>
  </div>
  <div class="main"><div style="max-width:450px;margin:0 auto">
    <button class="btn-back" onclick="backPick()">&#8592; Back to calendar</button>
    <h2 style="font-size:22px;font-weight:normal;margin-bottom:15px">Confirm your booking</h2>
    <div class="card card-hl" style="margin-bottom:18px">
      <div style="font-size:14px;color:#9b98ac">${fmtDate(S.sd)}</div>
      <div style="font-size:25px;color:#e8a87c;margin-top:5px">${S.st}</div>
    </div>
    <label class="lbl">Your Name *</label>
    <input class="inp" id="f-name" placeholder="Enter your name" value="${esc(S.name)}" oninput="S.name=this.value"/>
    <label class="lbl">Email ${REPLY_READY ? "* (required for confirmation)" : "(optional)"}</label>
    <input class="inp" id="f-email" type="email" placeholder="your@email.com" value="${esc(S.email)}" oninput="S.email=this.value"/>
    <label class="lbl">Note for organizer (optional)</label>
    <textarea class="inp" id="f-note" rows="3" placeholder="Anything you'd like to add?" oninput="S.note=this.value">${esc(S.note)}</textarea>
    ${S.berr?`<p class="err">${esc(S.berr)}</p>`:''}
    <button class="btn-primary" onclick="doBook()" ${S.busy?'disabled':''}>${S.busy?'Confirming&#8230;':'Confirm Booking'}</button>
  </div></div>`;
}

function vDone(){
  return`<div class="hdr">
    <div class="hdr-left"><div class="hdr-icon">&#128197;</div><span class="hdr-title">${CFG.title}</span></div>
    <button class="btn-ghost" onclick="goLogin()">Admin</button>
  </div>
  <div class="main" style="text-align:center;padding-top:48px">
    <div style="max-width:430px;margin:0 auto">
      <div style="width:66px;height:66px;border-radius:50%;background:rgba(126,200,164,.12);border:2px solid rgba(126,200,164,.35);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px">&#10003;</div>
      <h2 style="font-size:25px;font-weight:normal;margin-bottom:9px">You&#39;re booked!</h2>
      <p style="color:#9b98ac;font-size:15px;line-height:1.8;margin-bottom:3px"><em style="color:#e8a87c">${esc(S.name)}</em>, confirmed for:</p>
      <div class="card card-hl" style="display:inline-block;padding:18px 34px;margin:13px 0 18px;text-align:center">
        <div style="font-size:14px;color:#9b98ac">${fmtDate(S.sd)}</div>
        <div style="font-size:24px;color:#e8a87c;margin-top:5px">${S.st}</div>
      </div>
      <p style="color:#636078;font-size:13px;margin-bottom:22px">${REPLY_READY && S.email ? 'A confirmation email has been sent to ' + esc(S.email) + '.' : 'The organizer will be in touch.'}</p>
      <button class="btn-primary" style="max-width:240px;margin:0 auto" onclick="bookAgain()">Book Another Slot</button>
    </div>
  </div>`;
}

function vLogin(){
  return`<div class="hdr">
    <div class="hdr-left"><div class="hdr-icon">&#128197;</div><span class="hdr-title">${CFG.title}</span></div>
    <button class="btn-ghost" onclick="goBack()">&#8592; Back</button>
  </div>
  <div class="main"><div style="max-width:390px;margin:40px auto">
    <div class="card" style="padding:26px">
      <div style="width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#e8a87c,#d4845a);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:16px">&#128274;</div>
      <h2 style="font-size:20px;font-weight:normal;margin-bottom:6px">Admin Access</h2>
      <p style="color:#9b98ac;font-size:14px;margin-bottom:19px;line-height:1.6">Manage your availability and view bookings.</p>
      <input class="inp" id="pw" type="password" placeholder="Password" oninput="S.pw=this.value" onkeydown="if(event.key==='Enter')doLogin()"/>
      ${S.pwerr?'<p class="err">Incorrect password.</p>':''}
      <button class="btn-primary" onclick="doLogin()">Enter Admin</button>
    </div>
    <p style="color:#636078;font-size:12px;margin-top:11px;text-align:center">Default: admin123</p>
  </div></div>`;
}

function vAdmin(){
  const syncStatus=FIREBASE_READY
    ?`<span class="sync-bar ${S.syncing?'sync-spin':S.syncErr?'sync-err':'sync-ok'}">${S.syncing?'&#8635; saving…':S.syncErr?'&#9888; sync error':'&#10003; synced'}</span>`:'';

  const cal=buildCal(S.ay,S.am,k=>{
    if(isPast(k))return{cls:'d-past'};
    const slots=S.avail[k]||[];
    const op=slots.filter(t=>!isBook(k,t)).length;
    if(slots.length)return{cls:'d-aon click',fn:'admDay',tag:`${op}&#10003;`};
    return{cls:'d-aoff click',fn:'admDay'};
  },'admPrev','admNext');

  const dim=daysIn(S.ay,S.am);
  let editor='',hasUp=false;
  for(let d=1;d<=dim;d++){
    const k=toKey(S.ay,S.am,d);
    if(isPast(k))continue;
    hasUp=true;
    const slots=S.avail[k]||[];
    editor+=`<div style="margin-bottom:15px">
      <div style="font-size:13px;color:#9b98ac;margin-bottom:7px;font-weight:600">${fmtDate(k)}</div>
      <div>`;
    TIMES.forEach(t=>{
      const on=slots.includes(t), bk=isBook(k,t);
      if(bk) editor+=`<span class="pill p-lk">${t} &#10003;</span>`;
      else if(on) editor+=`<span class="pill p-on" onclick="admTime('${k}','${t}')">${t}</span>`;
      else editor+=`<span class="pill" onclick="admTime('${k}','${t}')">${t}</span>`;
    });
    editor+='</div></div>';
  }
  if(!hasUp) editor='<p style="color:#636078;font-size:14px">No upcoming dates this month.</p>';

  const upBk=[...S.books].filter(b=>!isPast(b.date)).sort((a,b)=>a.date.localeCompare(b.date)||TIMES.indexOf(a.time)-TIMES.indexOf(b.time));
  const ptBk=[...S.books].filter(b=>isPast(b.date));
  let bkHtml='';
  if(!S.books.length){
    bkHtml=`<div class="card" style="text-align:center;padding:44px"><div style="font-size:32px;margin-bottom:11px">&#128235;</div><p style="color:#636078">No bookings yet.</p></div>`;
  }else{
    if(upBk.length){bkHtml+=`<span class="lbl">Upcoming (${upBk.length})</span>`;upBk.forEach(b=>{bkHtml+=bkCard(b,false);});}
    if(ptBk.length){bkHtml+=`<span class="lbl" style="margin-top:22px;display:block">Past (${ptBk.length})</span>`;ptBk.forEach(b=>{bkHtml+=bkCard(b,true);});}
  }

  return`<div class="hdr">
    <div class="hdr-left"><div class="hdr-icon">&#128197;</div><span class="hdr-title">${CFG.title}</span><span class="badge">ADMIN</span></div>
    <button class="btn-ghost" onclick="exitAdm()">&#8592; Exit Admin</button>
  </div>
  <div class="main">
    <div style="margin-bottom:20px">
      <h2 style="font-size:23px;font-weight:normal;margin-bottom:4px">Admin Panel ${syncStatus}</h2>
      <p style="color:#9b98ac;font-size:14px;line-height:1.6">Click any day to enable all time slots. Fine-tune individual slots on the right.</p>
      ${!FIREBASE_READY?notConfiguredWarning():''}
    </div>
    <div class="tabs">
      <button class="tab ${S.atab==='cal'?'active':''}" onclick="setTab('cal')">Calendar</button>
      <button class="tab ${S.atab==='books'?'active':''}" onclick="setTab('books')">Bookings (${S.books.length})</button>
      <button class="tab ${S.atab==='test'?'active':''}" onclick="setTab('test')">&#9993; Test Email</button>
    </div>
    ${S.atab==='test'?`<div style="max-width:480px">
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Email Configuration Status</div>
        <div style="font-size:13px;line-height:2;color:#9b98ac">
          <div>Admin notifications (Formspree): <strong style="color:${EMAIL_READY?'#7ec8a4':'#e07878'}">${EMAIL_READY?'&#10003; Configured':'&#10007; Not configured — formspreeId is empty'}</strong></div>
          <div>Auto-reply (EmailJS): <strong style="color:${REPLY_READY?'#7ec8a4':'#e07878'}">${REPLY_READY?'&#10003; Configured':'&#10007; Not configured — ejPublicKey / ejServiceId / ejTemplateId empty'}</strong></div>
        </div>
      </div>
      <div class="card">
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Send a Test Notification</div>
        <p style="font-size:13px;color:#9b98ac;margin-bottom:14px;line-height:1.6">Sends a fake booking to your configured email(s) so you can verify everything is working.</p>
        <label class="lbl">Your email (for auto-reply test)</label>
        <input class="inp" id="test-email" placeholder="your@email.com" type="email"/>
        ${S.testStatus?`<div style="padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;background:${S.testStatus.startsWith('✓')?'rgba(126,200,164,.12)':'rgba(224,120,120,.12)'};border:1px solid ${S.testStatus.startsWith('✓')?'rgba(126,200,164,.35)':'rgba(224,120,120,.35)'};color:${S.testStatus.startsWith('✓')?'#7ec8a4':'#e07878'}">${S.testStatus}</div>`:''}
        <button class="btn-primary" onclick="testEmail()">Send Test Email</button>
      </div>
    </div>`:S.atab==='cal'?`<div class="adm-col">
      <div><span class="lbl">Click a day to toggle all slots</span><div class="card">${cal}</div></div>
      <div><span class="lbl">Fine-tune &#8212; ${MONTHS[S.am]} ${S.ay}</span>${editor}</div>
    </div>`:`<div>${bkHtml}</div>`}
  </div>`;
}

function bkCard(b,dim){
  return`<div class="card bk-card" style="opacity:${dim?.55:1}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:11px">
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:600">${esc(b.name)}</div>
        <div style="font-size:13px;color:#e8a87c;margin-top:4px">${fmtDate(b.date)} &middot; ${b.time}</div>
        ${b.email?`<div style="font-size:12px;color:#9b98ac;margin-top:3px">&#9993; ${esc(b.email)}</div>`:''}
        ${b.note?`<div style="font-size:13px;color:#9b98ac;margin-top:5px;font-style:italic">"${esc(b.note)}"</div>`:''}
        <div style="font-size:11px;color:#636078;margin-top:6px">Booked ${new Date(b.bookedAt).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}</div>
      </div>
      <button onclick="delBook('${b.id}')" style="background:none;border:none;color:#636078;cursor:pointer;font-size:19px;line-height:1;padding:0;flex-shrink:0">&#215;</button>
    </div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────
function pubPrev(){let{py:y,pm:m}=S;m===0?(y--,m=11):m--;S.py=y;S.pm=m;S.sd=null;S.st=null;render();}
function pubNext(){let{py:y,pm:m}=S;m===11?(y++,m=0):m++;S.py=y;S.pm=m;S.sd=null;S.st=null;render();}
function admPrev(){let{ay:y,am:m}=S;m===0?(y--,m=11):m--;S.ay=y;S.am=m;render();}
function admNext(){let{ay:y,am:m}=S;m===11?(y++,m=0):m++;S.ay=y;S.am=m;render();}

function selDate(k){S.sd=S.sd===k?null:k;S.st=null;render();}
function selTime(t){S.st=S.st===t?null:t;render();}
function goConfirm(){S.step="confirm";S.berr="";render();}
function backPick(){S.step="pick";S.berr="";render();}
function bookAgain(){S.step="pick";S.sd=null;S.st=null;S.name="";S.email="";S.note="";render();}
function goLogin(){S.view="login";S.pw="";S.pwerr=false;render();}
function goBack(){S.view="pub";render();}
function exitAdm(){S.view="pub";render();}
function setTab(t){S.atab=t;render();}

function doLogin(){
  const el=document.getElementById('pw');if(el)S.pw=el.value;
  if(S.pw===CFG.pass){S.view="admin";S.pwerr=false;render();}
  else{S.pwerr=true;render();}
}

function admDay(k){
  if(isPast(k))return;
  const cur=S.avail[k]||[];
  const locked=TIMES.filter(t=>isBook(k,t));
  const allOn=TIMES.every(t=>isBook(k,t)||cur.includes(t));
  const next=allOn?locked:[...new Set([...locked,...TIMES])];
  const av={...S.avail};
  if(!next.length)delete av[k];else av[k]=next;
  S.avail=av; save();
}
function admTime(k,t){
  if(isBook(k,t))return;
  const cur=S.avail[k]||[];
  const next=cur.includes(t)?cur.filter(x=>x!==t):[...cur,t];
  const av={...S.avail};
  if(!next.length)delete av[k];else av[k]=next;
  S.avail=av; save();
}
function delBook(id){
  S.books=S.books.filter(b=>b.id!==id); save();
}
async function doBook(){
  const n=document.getElementById('f-name'),e=document.getElementById('f-email'),nt=document.getElementById('f-note');
  if(n)S.name=n.value; if(e)S.email=e.value; if(nt)S.note=nt.value;
  if(!S.name.trim()){S.berr="Please enter your name.";render();return;}
  if(REPLY_READY && !S.email.trim()){S.berr="Please enter your email to receive a confirmation.";render();return;}
  if(isBook(S.sd,S.st)){S.berr="Slot just taken — please choose another.";S.step="pick";render();return;}
  S.busy=true;S.berr="";render();
  const entry={
    id:Date.now()+"_"+Math.random().toString(36).slice(2),
    date:S.sd,time:S.st,
    name:S.name.trim(),email:S.email.trim(),note:S.note.trim(),
    bookedAt:new Date().toISOString(),
  };
  S.books=[...S.books,entry];
  await save();
  sendNotification(entry);  // admin notification via Formspree
  sendAutoReply(entry);     // confirmation to booker via EmailJS
  S.busy=false;S.step="done";render();
}

// ── Boot ──────────────────────────────────────────────────────────

// -- Email notification via Formspree --
async function sendNotification(entry){
  if(!EMAIL_READY) return;
  try{
    await fetch(`https://formspree.io/f/${CFG.formspreeId}`, {
      method: "POST",
      headers: {"Content-Type": "application/json", "Accept": "application/json"},
      body: JSON.stringify({
        _subject : `New booking: ${entry.name} on ${fmtDate(entry.date)} at ${entry.time}`,
        Name     : entry.name,
        Email    : entry.email || "not provided",
        Date     : fmtDate(entry.date),
        Time     : entry.time,
        Note     : entry.note || "none",
      }),
    });
    console.log("Notification sent via Formspree");
  }catch(e){ console.warn("Notification failed:",e); }
}

// -- Auto-reply to booker via EmailJS (uses "Auto-Reply" template) --
async function sendAutoReply(entry){
  if(!REPLY_READY || !entry.email) return;
  try{
    if(!window.emailjs){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }
    emailjs.init(CFG.ejPublicKey);
    // Variable names match EmailJS "Auto-Reply" template exactly:
    // "email" → goes into the To Email field ({{email}})
    // "name"  → the booker's name
    // "title" → used as the email subject/reference
    // Extra variables fill in the body if you edit the template content
    await emailjs.send(CFG.ejServiceId, CFG.ejTemplateId, {
      email        : entry.email,              // recipient — DO NOT rename
      name         : entry.name,               // booker name
      title        : `Booking confirmed: ${fmtDate(entry.date)} at ${entry.time}`,
      booking_date : fmtDate(entry.date),
      booking_time : entry.time,
      booking_note : entry.note || "—",
      app_title    : CFG.title,
    });
    console.log("Auto-reply sent to", entry.email);
  }catch(e){ console.warn("Auto-reply failed:",e); }
}

// -- Test email function --
async function testEmail(){
  const emailEl = document.getElementById('test-email');
  const testEmailAddr = emailEl ? emailEl.value.trim() : '';
  
  const fakeEntry = {
    name : "Test Person",
    email: testEmailAddr || "test@example.com",
    date : new Date().toISOString().slice(0,10).replace(/-/g,(m,i)=>i===0?m:'-').replace(/(\d{4})-(\d{2})-(\d{2})/,'$1-$2-$3'),
    time : "10:00 AM",
    note : "This is a test booking",
  };
  // make a proper date key for today
  const n=new Date();
  fakeEntry.date = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');

  S.testStatus = "Sending…"; render();
  
  let results = [];
  
  // Test Formspree
  if(EMAIL_READY){
    try{
      const r = await fetch(`https://formspree.io/f/${CFG.formspreeId}`, {
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body: JSON.stringify({
          _subject : `TEST booking: ${fakeEntry.name} on ${fmtDate(fakeEntry.date)} at ${fakeEntry.time}`,
          Name: fakeEntry.name, Email: fakeEntry.email,
          Date: fmtDate(fakeEntry.date), Time: fakeEntry.time, Note: fakeEntry.note,
        }),
      });
      const d = await r.json();
      if(r.ok) results.push("✓ Admin notification sent via Formspree — check your inbox");
      else results.push("✗ Formspree error: " + (d.error||r.status) + " — check your formspreeId and that your Formspree form is activated");
    }catch(e){ results.push("✗ Formspree failed: " + e.message); }
  } else {
    results.push("— Admin notification skipped (formspreeId not set)");
  }

  // Test EmailJS auto-reply
  if(REPLY_READY){
    if(!testEmailAddr){ results.push("— Auto-reply skipped: enter your email above to test it"); }
    else {
      try{
        if(!window.emailjs){
          await new Promise((res,rej)=>{
            const s=document.createElement('script');
            s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
            s.onload=res; s.onerror=rej; document.head.appendChild(s);
          });
        }
        emailjs.init(CFG.ejPublicKey);
        const r = await emailjs.send(CFG.ejServiceId, CFG.ejTemplateId, {
          email: testEmailAddr, name: fakeEntry.name,
          title: `TEST: Booking confirmed ${fmtDate(fakeEntry.date)} at ${fakeEntry.time}`,
          booking_date: fmtDate(fakeEntry.date), booking_time: fakeEntry.time,
          booking_note: fakeEntry.note, app_title: CFG.title,
        });
        results.push("✓ Auto-reply sent to " + testEmailAddr + " via EmailJS — check inbox");
      }catch(e){ results.push("✗ EmailJS error: " + e.message + " — check your ejPublicKey, ejServiceId, ejTemplateId"); }
    }
  } else {
    results.push("— Auto-reply skipped (EmailJS not configured)");
  }

  S.testStatus = results.join(" | ");
  render();
}

(async()=>{
  render(); // show spinner
  await load();
  S.loaded=true;
  render();
})();
</script>
